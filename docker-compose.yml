version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kavabanga_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kavabanga
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kavabanga123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
